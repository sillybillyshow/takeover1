<script>
  const workerURL = "https://tiktok-follower-api.sillybillyshowemail.workers.dev";

  const countEl = document.getElementById("count");

  // Create countdown element
  const countdownEl = document.createElement("div");
  countdownEl.style.marginTop = "20px";
  countdownEl.style.fontSize = "1.5em";
  document.body.appendChild(countdownEl);

  let secondsRemaining = 60;
  let isFetching = false;

  async function updateFollowerCount() {
    if (isFetching) return; // Prevent overlapping calls
    isFetching = true;

    try {
      const res = await fetch(workerURL);
      const data = await res.json();
      countEl.textContent = data.followers.toLocaleString();
      secondsRemaining = 60; // Reset countdown after successful fetch
    } catch (err) {
      countEl.textContent = "Error";
      console.error(err);
    }

    isFetching = false;
  }

  // Countdown timer (runs every second)
  setInterval(() => {
    secondsRemaining--;
    if (secondsRemaining <= 0) {
      updateFollowerCount();
    }
    countdownEl.textContent = `Refreshing in ${secondsRemaining}s`;
  }, 1000);

  // Initial load
  updateFollowerCount();
</script>
