<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Billy Show Takeover</title>

  <!-- Preconnect to Google Fonts to reduce connection latency -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Bebas Neue for display headings and numbers; DM Sans for body text and labels -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Three.js r128 — used by globe.js for all WebGL rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    /* Reset box model for all elements */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Brand red — used for the follower row, progress bar, and UI accents */
      --red: #ff0050;
      --red-glow: rgba(255,0,80,0.18);

      /* Globe green — overtaken city colour, reflected in the legend */
      --green: #00e676;

      /* Dark background palette */
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;

      /* Subtle border colour */
      --border: rgba(255,255,255,0.07);

      /* Text colours */
      --text: #f0f0f0;
      --muted: #888;

      /* Typography */
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      /* Shared card border radius */
      --radius: 12px;

      /* Row height — must match ROW_HEIGHT constant in app.js */
      --row-height: 44px;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      min-height: 100vh;
      /* Faint red glow at the top of the page reinforces the brand colour */
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,0,80,0.1) 0%, transparent 70%);
    }

    /* Constrain all content to a comfortable reading width */
    .page {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ── */

    .header { text-align: center; padding-top: 8px; }

    .header h1 {
      font-family: var(--font-display);
      /* Fluid font size scales between mobile and desktop */
      font-size: clamp(2.4rem, 7vw, 4rem);
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    /* "Takeover" highlighted in brand red */
    .header h1 span { color: var(--red); }

    .header-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Timer ── */

    .timer-block { display: flex; flex-direction: column; gap: 8px; }

    .timer-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Grey track behind the progress bar */
    .bar-track {
      width: 100%;
      height: 3px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }

    /* Bar width is driven by app.js every 250ms */
    #bar {
      height: 100%;
      width: 0%;
      background: var(--red);
      border-radius: 999px;
      transition: width 0.25s linear;
      box-shadow: 0 0 8px var(--red);
    }

    /* ── Globe ── */

    /* Card wrapper matching the style of other surface cards */
    .globe-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    /* Three.js mounts its canvas here — sized to fill the card */
    #globe-container {
      width: 100%;
      height: 420px;
      cursor: grab;
      display: block;
    }

    #globe-container:active { cursor: grabbing; }

    /* Colour legend in the bottom-left of the globe */
    .globe-legend {
      position: absolute;
      bottom: 14px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Green — cities that have been overtaken */
    .legend-dot--overtaken { background: var(--green); box-shadow: 0 0 4px var(--green); }

    /* White — the very next city to overtake */
    .legend-dot--next      { background: #ffffff; }

    /* Near-black — cities not yet reached */
    .legend-dot--future    { background: #333; border: 1px solid #555; }

    /* Interaction hints in the top-right corner of the globe */
    .globe-hints {
      position: absolute;
      top: 12px;
      right: 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      pointer-events: none;
    }

    .globe-hint {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Summary panels ── */

    /* Three equal columns */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    /* Centre panel uses brand red to emphasise the follower count */
    .panel--center {
      background: var(--red);
      border-color: var(--red);
      box-shadow: 0 0 32px var(--red-glow), 0 4px 20px rgba(0,0,0,0.4);
    }

    .panel-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .panel--center .panel-label { color: rgba(255,255,255,0.7); }

    .panel-name {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .panel--center .panel-name { color: #fff; }

    /* Display font for large numbers in each panel */
    .panel-value {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 0.02em;
      color: var(--red);
      line-height: 1;
    }

    .panel--center .panel-value { color: #fff; font-size: 2rem; }

    /* ── Search ── */

    /* Relative positioning allows the results dropdown to anchor to this element */
    .search-panel { position: relative; }

    .search-row { display: flex; gap: 8px; }

    #location-search {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    #location-search::placeholder { color: var(--muted); }

    /* Brand-red focus ring */
    #location-search:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
    }

    .btn {
      border: none;
      border-radius: var(--radius);
      padding: 0 18px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn--primary { background: var(--red); color: #fff; }
    .btn--primary:hover { opacity: 0.88; }

    .btn--ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn--ghost:hover { color: var(--text); }

    /* Results dropdown anchored below the search row */
    #search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 20;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }

    .search-result {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }

    .search-result:hover { background: var(--surface2); color: var(--red); }

    /* ── Table ── */

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Fixed column header above the scroll viewport */
    .table-header {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      padding: 10px 18px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    /* Fixed-height scroll viewport — virtual scrolling operates within this */
    #table-body {
      position: relative;
      height: 440px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }

    #table-body::-webkit-scrollbar { width: 4px; }
    #table-body::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    /* Spacer height = total rows × ROW_HEIGHT, giving the scrollbar correct proportions
       for 48,000+ rows without rendering them all */
    #table-spacer {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      pointer-events: none;
    }

    /* Rows are absolutely positioned via translateY — only ~25 exist in the DOM at once */
    .row {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--row-height);
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .row:hover { background: var(--surface2); }

    /* Follower row is branded red to make it immediately identifiable in the list */
    .row--follower {
      background: var(--red) !important;
      z-index: 1;
      box-shadow: 0 0 24px var(--red-glow);
    }

    .row--follower .row-rank,
    .row--follower .row-name,
    .row--follower .row-value {
      color: #fff !important;
      font-weight: 700;
    }

    /* City the user navigated to via search gets a subtle red outline */
    .row--focused {
      outline: 1px solid rgba(255,0,80,0.4);
      background: rgba(255,0,80,0.05);
    }

    /* Tabular numerals keep rank digits aligned across all rows */
    .row-rank {
      font-size: 0.8rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .row-name {
      font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Population figures right-aligned with tabular numerals */
    .row-value {
      font-size: 0.88rem;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      white-space: nowrap;
      text-align: right;
    }

    /* ── Footer ── */

    .page-footer { text-align: center; font-size: 0.78rem; color: var(--muted); }
    .page-footer a { color: var(--muted); text-decoration: underline; }
    .page-footer a:hover { color: var(--text); }

    /* ── Responsive ── */

    @media (max-width: 560px) {
      /* Stack summary panels vertically on mobile, follower panel first */
      .summary { grid-template-columns: 1fr; }
      .panel--center { order: -1; }

      /* Allow search buttons to wrap if the input is too wide */
      .search-row { flex-wrap: wrap; }
      .btn { height: 44px; }

      /* Shorter globe and table on mobile */
      #globe-container { height: 280px; }
      #table-body { height: 360px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Page heading -->
    <header class="header">
      <h1>Silly Billy Show <span>Takeover</span></h1>
      <p class="header-sub">Live TikTok follower ranking vs world cities</p>
    </header>

    <!-- Progress bar and countdown — updated every 250ms by app.js -->
    <div class="timer-block">
      <div class="timer-label">
        <span>Live update</span>
        <span id="countdown">Loading...</span>
      </div>
      <div class="bar-track">
        <!-- Width set by app.js based on ms remaining until next :00 or :30 boundary -->
        <div id="bar"></div>
      </div>
    </div>

    <!-- WebGL globe — Three.js canvas injected into #globe-container by globe.js.
         Green dots = overtaken cities. White dot = next target. Near-black = not yet reached.
         World map texture drawn from Natural Earth GeoJSON boundaries. -->
    <div class="globe-wrap">
      <div id="globe-container"></div>

      <!-- Interaction hints -->
      <div class="globe-hints">
        <span class="globe-hint">Drag to rotate</span>
        <span class="globe-hint">Scroll to zoom</span>
      </div>

      <!-- Colour key for the three city states -->
      <div class="globe-legend">
        <div class="legend-item">
          <div class="legend-dot legend-dot--overtaken"></div>
          <span>Overtaken</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot legend-dot--next"></div>
          <span>Next target</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot legend-dot--future"></div>
          <span>Not yet reached</span>
        </div>
      </div>
    </div>

    <!-- Summary panels: most recently overtaken place | follower count | next place to overtake -->
    <section class="summary">
      <div class="panel">
        <span class="panel-label">Just overtaken</span>
        <!-- Set by renderPanels() in app.js -->
        <span class="panel-name" id="panel-last-name">—</span>
        <span class="panel-value" id="panel-last-pop">—</span>
      </div>

      <!-- Centre panel is branded red — the focal point of the page -->
      <div class="panel panel--center">
        <span class="panel-label">Silly Billy Show</span>
        <span class="panel-name">TikTok Followers</span>
        <!-- Updated by renderPanels() on every successful Gist fetch -->
        <span class="panel-value" id="panel-followers">—</span>
      </div>

      <div class="panel">
        <span class="panel-label">Next to overtake</span>
        <!-- Set by renderPanels() in app.js -->
        <span class="panel-name" id="panel-next-name">—</span>
        <span class="panel-value" id="panel-next-pop">—</span>
      </div>
    </section>

    <!-- Search — filters the 48k city dataset and scrolls the virtual table to the result -->
    <div class="search-panel">
      <div class="search-row">
        <input id="location-search" type="text" placeholder="Search for a city…" autocomplete="off">
        <button id="search-button" class="btn btn--primary" type="button">Search</button>
        <!-- Reset scrolls back to the follower row and clears the search -->
        <button id="reset-button" class="btn btn--ghost" type="button">Reset</button>
      </div>
      <!-- Dropdown — hidden until doSearch() populates it -->
      <div id="search-results" hidden></div>
    </div>

    <!-- Virtual scroll table — only ~25 rows exist in the DOM at any time regardless of dataset size -->
    <div class="table-wrap">
      <div class="table-header">
        <span>#</span>
        <span>Place</span>
        <span>Population</span>
      </div>

      <!-- Fixed-height scroll viewport — app.js manages which rows are rendered inside it -->
      <div id="table-body">
        <!-- Spacer height = total rows × 44px, giving the scrollbar accurate proportions -->
        <div id="table-spacer"></div>
      </div>
    </div>

    <!-- Data source attribution -->
    <footer class="page-footer">
      Data: <a href="https://simplemaps.com/data/world-cities" target="_blank" rel="noreferrer">Simplemaps World Cities Database</a>
    </footer>

  </div>

  <!-- Module type required for dynamic import('./globe.js') in app.js -->
  <script type="module" src="app.js"></script>
</body>
</html>
