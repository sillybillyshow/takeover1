<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Billy Show Takeover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff0050;
      --red-dark: #cc0040;
      --red-glow: rgba(255,0,80,0.18);
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: #888;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 12px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,0,80,0.12) 0%, transparent 70%);
    }

    .page {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding-top: 8px;
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 7vw, 4rem);
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    .header h1 span {
      color: var(--red);
    }

    .header-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Timer ── */
    .timer-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .timer-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #countdown {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .bar-track {
      width: 100%;
      height: 3px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: var(--red);
      border-radius: 999px;
      transition: width 0.25s linear;
      box-shadow: 0 0 8px var(--red);
    }

    /* ── Summary panels ── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .panel--center {
      background: var(--red);
      border-color: var(--red);
      box-shadow: 0 0 32px var(--red-glow), 0 4px 20px rgba(0,0,0,0.4);
    }

    .panel-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .panel--center .panel-label {
      color: rgba(255,255,255,0.7);
    }

    .panel-name {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }

    .panel--center .panel-name {
      color: #fff;
      font-size: 1rem;
    }

    .panel-value {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.02em;
      color: var(--red);
      line-height: 1;
    }

    .panel--center .panel-value {
      color: #fff;
      font-size: 2rem;
    }

    /* ── Search ── */
    .search-panel {
      position: relative;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    #location-search {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    #location-search::placeholder { color: var(--muted); }

    #location-search:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
    }

    .btn {
      border: none;
      border-radius: var(--radius);
      padding: 0 18px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn--primary {
      background: var(--red);
      color: #fff;
    }

    .btn--primary:hover { opacity: 0.88; }

    .btn--ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn--ghost:hover { color: var(--text); }

    #search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 20;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }

    .search-result {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }

    .search-result:hover, .search-result.active {
      background: var(--surface2);
      color: var(--red);
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      padding: 10px 18px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    #table-body {
      max-height: 420px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }

    #table-body::-webkit-scrollbar { width: 4px; }
    #table-body::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--surface2); }

    .row--follower {
      background: var(--red) !important;
      position: sticky;
      top: 0;
      bottom: 0;
      z-index: 2;
      box-shadow: 0 0 24px var(--red-glow);
    }

    .row--follower .row-rank,
    .row--follower .row-name,
    .row--follower .row-value {
      color: #fff !important;
      font-weight: 700;
    }

    .row--focused {
      outline: 1px solid rgba(255,0,80,0.4);
      background: rgba(255,0,80,0.05);
    }

    .row-rank {
      font-size: 0.8rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .row-name {
      font-size: 0.9rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-value {
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      white-space: nowrap;
      text-align: right;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .page-footer a { color: var(--muted); text-decoration: underline; }
    .page-footer a:hover { color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .summary { grid-template-columns: 1fr; }
      .panel--center { order: -1; }
      .search-row { flex-wrap: wrap; }
      .btn { height: 44px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <h1>Silly Billy Show <span>Takeover</span></h1>
      <p class="header-sub">Live TikTok follower ranking vs world cities</p>
    </header>

    <div class="timer-block">
      <div class="timer-label">
        <span>Live update</span>
        <span id="countdown">Loading...</span>
      </div>
      <div class="bar-track">
        <div id="bar"></div>
      </div>
    </div>

    <section class="summary">
      <div class="panel">
        <span class="panel-label">Just overtaken</span>
        <span class="panel-name" id="panel-last-name">—</span>
        <span class="panel-value" id="panel-last-pop">—</span>
      </div>
      <div class="panel panel--center">
        <span class="panel-label">Silly Billy Show</span>
        <span class="panel-name">TikTok Followers</span>
        <span class="panel-value" id="panel-followers">—</span>
      </div>
      <div class="panel">
        <span class="panel-label">Next to overtake</span>
        <span class="panel-name" id="panel-next-name">—</span>
        <span class="panel-value" id="panel-next-pop">—</span>
      </div>
    </section>

    <div class="search-panel">
      <div class="search-row">
        <input id="location-search" type="text" placeholder="Search for a city…" autocomplete="off">
        <button id="search-button" class="btn btn--primary" type="button">Search</button>
        <button id="reset-button" class="btn btn--ghost" type="button">Reset</button>
      </div>
      <div id="search-results" hidden></div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span>#</span>
        <span>Place</span>
        <span>Population</span>
      </div>
      <div id="table-body"></div>
    </div>

    <footer class="page-footer">
      Data: <a href="https://simplemaps.com/data/world-cities" target="_blank" rel="noreferrer">Simplemaps World Cities Database</a>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
