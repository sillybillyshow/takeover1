<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silly Billy Show Takeover</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #ff0050;
  }

  #timer-container {
    width: 100%;
    max-width: 500px;
    margin-bottom: 20px;
  }

  #countdown {
    text-align: center;
    font-size: 1em;
    margin-bottom: 5px;
  }

  #bar-container {
    width: 100%;
    background: #ddd;
    border-radius: 10px;
    height: 10px;
    overflow: hidden;
  }

  #bar {
    height: 100%;
    width: 0%;
    background: #ff0050;
    transition: width 0.5s linear;
  }

  .cards-container {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: min(75vh, 720px);
    overflow-y: auto;
    padding-right: 6px;
    scroll-behavior: smooth;
  }

  .card {
    display: flex;
    justify-content: space-between;
    background: #fff;
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    transition: transform 0.8s ease;
    position: relative;
  }

  .card.top-card,
  .card.bottom-card {
    border-left: 4px solid #ff7aa8;
  }

  .card.follower {
    background: #ff0050;
    color: #fff;
    font-weight: bold;
    font-size: 1.1em;
    position: sticky;
    z-index: 1;
  }
</style>
</head>
<body>

<h1>Silly Billy Show Takeover</h1>

<div id="timer-container">
  <div id="countdown">Next update in 60s</div>
  <div id="bar-container">
    <div id="bar"></div>
  </div>
</div>

<div class="cards-container" id="cards-container">
  <!-- Cards will be injected here -->
</div>

<script src="app.js"></script>
</body>
</html>
