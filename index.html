<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>TikTok vs Cities</title>

    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0e0e0e;
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #followers {
            font-size: 64px;
            font-weight: bold;
            color: #ff0050;
        }

        #countdown {
            margin-top: 8px;
            opacity: 0.7;
        }

        #progress {
            height: 6px;
            background: #333;
            margin-top: 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        #bar {
            height: 100%;
            width: 0%;
            background: #ff0050;
        }

        #rank {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .city {
            padding: 5px 0;
            font-size: 16px;
        }

        #map {
            height: 60vh;
            margin-top: 10px;
        }

        hr {
            border: none;
            border-top: 1px solid #333;
            margin: 20px 0;
        }

        @media(max-width:700px) {

            #followers {
                font-size: 42px;
            }

            #map {
                height: 50vh;
            }

            .city {
                font-size: 14px;
            }

        }
    </style>

</head>

<body>

    <header>

        <h1>TikTok Followers</h1>

        <div id="followers">Loading...</div>

        <div id="countdown">Loading...</div>

        <div id="progress">
            <div id="bar"></div>
        </div>

    </header>

    <section id="rank">

        <h2>Bigger Than</h2>
        <div id="above"></div>

        <hr>

        <h2>Next To Beat</h2>
        <div id="below"></div>

    </section>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>

</body>

</html>
